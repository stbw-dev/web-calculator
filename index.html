<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Welcome to Stafford's Calculator!</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>
    <body>
        <div class="calc-container">
            <div class="row-1">
                <div class="display">0</div>
            </div>
            <div class="row-2">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button class="operator">+</button>
            </div>
            <div class="row-3">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button class="operator">-</button>
            </div>
            <div class="row-4">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button class="operator">*</button>
            </div>
            <div class="row-5">
                <button id="clear">C</button>
                <button>0</button>
                <button id="equals">=</button>
                <button class="operator">/</button>
            </div>
        </div>
    </body>
</html>
